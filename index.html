<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Študent naj bo!</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="topBar">
        <p class="eyebrow">radiostudent.si / glasbene opreme · <a href="https://github.com/rokroskar/student-naj-bo" target="_blank" rel="noreferrer">github ↗</a> · <a href="https://github.com/rokroskar/student-naj-bo/issues/new?title=Playlist%20URL%20does%20not%20work&body=Radio%20%C5%A0tudent%20URL%3A%20%0A%0AWhat%20happened%3A%20" target="_blank" rel="noreferrer">report issue ↗</a> · <a href="spotify-client-id.html">own spotify id →</a></p>
        <div class="spotifyConnect">
          <button id="spotifyLogin" class="spotifyButton" aria-label="Connect Spotify">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 1.8A10.2 10.2 0 1 0 12 22.2 10.2 10.2 0 0 0 12 1.8Zm4.68 14.71a.78.78 0 0 1-1.08.26c-2.96-1.8-6.68-2.21-11.06-1.21a.78.78 0 1 1-.35-1.52c4.79-1.1 8.9-.62 12.23 1.41.37.23.49.7.26 1.06Zm1.25-2.79a.97.97 0 0 1-1.34.32c-3.39-2.08-8.55-2.68-12.56-1.47a.97.97 0 0 1-.56-1.86c4.57-1.38 10.25-.7 14.14 1.69.45.27.59.86.32 1.32Zm.11-2.91C13.98 8.4 7.28 8.17 3.4 9.35a1.16 1.16 0 1 1-.68-2.22c4.46-1.35 11.85-1.08 16.5 1.67a1.16 1.16 0 0 1-1.18 2.01Z"/></svg>
            <span class="spotifyText">Connect</span>
            <span id="spotifyState" class="connectionDot disconnected" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <h1>Študent naj bo!</h1>
      <p>Pick a Radio Študent day and play its tracklist through Spotify.</p>
    </header>

    <section class="card controls">
      <div class="urlLoad">
        <input id="detailUrl" type="url" placeholder="…or paste a Radio Študent tracklist URL" />
        <button id="loadUrl">Load URL</button>
      </div>
      <div id="status" role="status"></div>
    </section>

    <section id="nowPlaying" class="nowPlaying hidden" aria-live="polite"></section>

    <section class="grid">
      <aside class="card">
        <div class="sectionHeader">
          <h2>Available lists</h2>
          <button id="loadLatest" class="iconButton" title="Refresh lists" aria-label="Refresh lists">↻</button>
        </div>
        <div id="lists" class="lists empty">Loading Radio Študent lists…</div>
      </aside>

      <section class="card playerCard">
        <div class="titleRow">
          <div class="playlistHeading">
            <h2 id="playlistTitle">Tracklist</h2>
            <a id="sourceLink" class="externalIcon hidden" target="_blank" rel="noreferrer" title="Open original Radio Študent page" aria-label="Open original Radio Študent page">↗</a>
          </div>
          <div class="actions">
            <button id="copyTracks" disabled>Copy</button>
            <button id="playDay" class="primary playIcon" title="Play day" aria-label="Play day" disabled>▶</button>
            <button id="createPlaylist" disabled>Save playlist</button>
            <button id="openSpotify" disabled>Search Spotify</button>
          </div>
        </div>
        <div id="playlistStatus" class="playlistStatus"></div>

        <ol id="tracks" class="tracks empty">Choose a list to see tracks.</ol>
      </section>
    </section>
  </main>
  <script src="parser.js"></script>
  <script src="app.js"></script>
</body>
</html>
